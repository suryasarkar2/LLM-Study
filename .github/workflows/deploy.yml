name: Inject Secrets and Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch: # Added manual trigger for you too

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject secret into HTML
        run: |
          sed -i "s@__MY_SECRET_PLACEHOLDER__@${{ secrets.GEMINI_KEY }}@g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
